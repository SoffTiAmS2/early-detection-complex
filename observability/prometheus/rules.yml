groups:
  - name: edc.rules
    rules:
      - alert: EDCSensorOffline
        expr: edc_sensor_online == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "EDC sensor is offline"
          description: "Sensor {{ $labels.sensor_id }} has not synced recently."

      - alert: EDCHighEventVolume
        expr: edc_suspicious_events_window_total > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High honeypot event volume"
          description: "The center currently sees more than 100 suspicious events in its query window."
