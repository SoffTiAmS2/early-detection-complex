---
- name: Install or update an Early Detection Complex sensor
  hosts: sensors
  become: true
  gather_facts: true
  vars:
    remote_root: /opt/early-detection-complex
    compose_project: "edc_{{ target_sensor | lower }}"

  tasks:
    - name: Validate requested sensor
      ansible.builtin.assert:
        that:
          - target_sensor is defined
          - target_sensor is match('^[A-Za-z0-9_-]+$')
          - project_root is defined
        fail_msg: "target_sensor and project_root are required"

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-cli
          - python3
          - rsync
          - curl
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Try to install Docker Compose plugin
      ansible.builtin.apt:
        name: docker-compose-plugin
        state: present
      register: compose_plugin_install
      ignore_errors: true
      when: ansible_os_family == "Debian"

    - name: Install legacy docker-compose when plugin is unavailable
      ansible.builtin.apt:
        name: docker-compose
        state: present
      when:
        - ansible_os_family == "Debian"
        - compose_plugin_install is failed

    - name: Enable Docker service
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Detect compose command
      ansible.builtin.shell: |
        set -eu
        command -v docker >/dev/null 2>&1
        if docker compose version >/dev/null 2>&1; then
          echo "docker compose"
        elif command -v docker-compose >/dev/null 2>&1; then
          echo "docker-compose"
        else
          exit 1
        fi
      args:
        executable: /bin/sh
      changed_when: false
      register: compose_command

    - name: Ensure sensor directory exists before cleanup
      ansible.builtin.file:
        path: "{{ remote_root }}/sensors/{{ target_sensor }}"
        state: directory
        mode: "0755"

    - name: Stop previous sensor compose stack
      ansible.builtin.shell: |
        set -eu
        if [ -f docker-compose.yml ] || [ -f compose.yml ] || [ -f compose.yaml ]; then
          {{ compose_command.stdout }} down --remove-orphans
          COMPOSE_PROJECT_NAME={{ compose_project }} {{ compose_command.stdout }} down --remove-orphans
        fi
      args:
        chdir: "{{ remote_root }}/sensors/{{ target_sensor }}"
        executable: /bin/sh
      register: previous_compose_down
      changed_when: "'Removing' in previous_compose_down.stdout or 'Stopping' in previous_compose_down.stdout"
      failed_when: false

    - name: Remove leftover EDC compose containers
      ansible.builtin.shell: |
        set -eu
        containers="$( \
          { \
            docker ps -aq --filter "label=com.docker.compose.project={{ target_sensor }}"; \
            docker ps -aq --filter "label=com.docker.compose.project={{ compose_project }}"; \
          } | sort -u | tr '\n' ' ' \
        )"
        if [ -n "$(printf '%s' "$containers" | tr -d ' ')" ]; then
          docker rm -f $containers
        fi
      args:
        executable: /bin/sh
      register: leftover_container_remove
      changed_when: "leftover_container_remove.stdout | trim | length > 0"

    - name: Remove stale generated sensor files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ remote_root }}/sensors/{{ target_sensor }}/.env"
        - "{{ remote_root }}/sensors/{{ target_sensor }}/README.md"
        - "{{ remote_root }}/sensors/{{ target_sensor }}/docker-compose.yml"
        - "{{ remote_root }}/sensors/{{ target_sensor }}/config"
        - "{{ remote_root }}/sensors/{{ target_sensor }}/cowrie/etc"
        - "{{ remote_root }}/sensors/{{ target_sensor }}/cowrie/honeyfs"

    - name: Create project directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ remote_root }}"
        - "{{ remote_root }}/sensor"
        - "{{ remote_root }}/sensor/runtime"
        - "{{ remote_root }}/sensors"
        - "{{ remote_root }}/sensors/{{ target_sensor }}"
        - "{{ remote_root }}/sensors/{{ target_sensor }}/logs"

    - name: Copy sensor runtime image sources
      ansible.builtin.copy:
        src: "{{ project_root }}/{{ item }}"
        dest: "{{ remote_root }}/{{ item }}"
        mode: preserve
      loop:
        - sensor/Dockerfile
        - sensor/runtime/entrypoint.py
        - sensor/runtime/log_agent.py
        - sensor/runtime/display_agent.py

    - name: Copy generated sensor files
      ansible.builtin.copy:
        src: "{{ project_root }}/sensors/{{ target_sensor }}/"
        dest: "{{ remote_root }}/sensors/{{ target_sensor }}/"
        directory_mode: "0755"

    - name: Ensure runtime writable directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0777"
      loop:
        - "{{ remote_root }}/sensors/{{ target_sensor }}/logs"
        - "{{ remote_root }}/sensors/{{ target_sensor }}/cowrie/downloads"
        - "{{ remote_root }}/sensors/{{ target_sensor }}/cowrie/honeyfs"

    - name: Start or update sensor containers
      ansible.builtin.shell: "COMPOSE_PROJECT_NAME={{ compose_project }} {{ compose_command.stdout }} up -d --build"
      args:
        chdir: "{{ remote_root }}/sensors/{{ target_sensor }}"
        executable: /bin/sh
      register: compose_up

    - name: Show sensor container status
      ansible.builtin.shell: "COMPOSE_PROJECT_NAME={{ compose_project }} {{ compose_command.stdout }} ps"
      args:
        chdir: "{{ remote_root }}/sensors/{{ target_sensor }}"
        executable: /bin/sh
      changed_when: false
      register: compose_ps

    - name: Deployment summary
      ansible.builtin.debug:
        msg: "{{ compose_ps.stdout_lines }}"
