<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{SITE_NAME}} · события</title>
  <style>
    :root { --bg:#f4f6f9; --panel:#fff; --line:#d8dee9; --muted:#627084; --text:#17202a; --accent:#0f766e; --warn:#a16207; --bad:#b42318; --good:#137333; --soft:#eef6f5; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, sans-serif; background: var(--bg); color: var(--text); }
    header { display: flex; justify-content: space-between; gap: 12px; align-items: center; padding: 14px 18px; background: var(--panel); border-bottom: 1px solid var(--line); }
    main { max-width: 1620px; margin: 0 auto; padding: 16px 18px 32px; }
    h1 { font-size: 18px; margin: 0; }
    .muted { color: var(--muted); }
    .toplinks, .tabs, .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    button, .button, input, select { border: 1px solid #c8d2de; border-radius: 6px; padding: 8px 10px; font: inherit; min-height: 36px; }
    button, .button { background: var(--accent); color: #fff; border-color: var(--accent); cursor: pointer; text-decoration: none; }
    button.secondary, .button.secondary { background: #fff; color: var(--text); border-color: var(--line); }
    button.danger { background: var(--bad); border-color: var(--bad); }
    button.active { background: var(--soft); color: var(--accent); border-color: #9ad0c8; }
    .stats { display: grid; grid-template-columns: repeat(6, minmax(150px, 1fr)); gap: 10px; margin-bottom: 12px; }
    .stat { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 12px; min-height: 78px; }
    .stat .k { color: var(--muted); font-size: 12px; text-transform: uppercase; }
    .stat .v { font-size: 24px; font-weight: 750; margin-top: 4px; }
    .filters { display: grid; grid-template-columns: repeat(8, minmax(120px, 1fr)); gap: 8px; margin: 10px 0; }
    .summary { display: grid; grid-template-columns: repeat(5, minmax(160px, 1fr)); gap: 10px; margin: 12px 0; }
    .summary > div { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 10px; }
    .summary h2 { font-size: 13px; margin: 0 0 8px; color: var(--muted); text-transform: uppercase; }
    .pill { display: inline-flex; gap: 6px; align-items: center; border: 1px solid var(--line); border-radius: 999px; padding: 3px 8px; margin: 2px 4px 2px 0; background: #fff; font-size: 12px; }
    .table-wrap { overflow: auto; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); }
    table { width: 100%; border-collapse: collapse; min-width: 1100px; }
    th, td { padding: 8px 7px; border-top: 1px solid #edf1f5; font-size: 13px; text-align: left; vertical-align: top; }
    th { position: sticky; top: 0; z-index: 1; background: #f8fafc; color: var(--muted); border-top: 0; }
    code { font-size: 12px; white-space: pre-wrap; word-break: break-word; }
    details summary { cursor: pointer; color: var(--accent); }
    .sev-high { color: var(--bad); font-weight: 700; }
    .sev-medium { color: var(--warn); font-weight: 700; }
    .sev-low { color: var(--good); font-weight: 700; }
    .msg { min-height: 22px; color: var(--muted); margin: 8px 0; }
    @media (max-width: 1300px) { .stats { grid-template-columns: repeat(3, 1fr); } .summary { grid-template-columns: repeat(2, 1fr); } .filters { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 760px) { header { align-items: flex-start; flex-direction: column; } .stats, .summary, .filters { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>EDC · события и логи</h1>
      <div class="muted">{{SITE_NAME}}</div>
    </div>
    <nav class="toplinks">
      <a class="button secondary" href="/settings">Центр</a>
      <a class="button secondary" href="/profiles">Профили</a>
      <a class="button" href="{{GRAFANA_LOGS_URL}}" target="_blank" rel="noopener">Grafana</a>
    </nav>
  </header>
  <main>
    <section class="stats" id="stats"></section>

    <section class="tabs" aria-label="Режим просмотра">
      <button id="tabNormalized" class="active" data-mode="normalized">Нормализованные события</button>
      <button id="tabRaw" class="secondary" data-mode="raw">Raw honeypot logs</button>
      <button id="tabEvents" class="secondary" data-mode="events">Системный журнал</button>
    </section>

    <section class="filters">
      <input id="fSensor" placeholder="sensor_id">
      <input id="fProfile" placeholder="profile">
      <input id="fHoneypot" placeholder="honeypot">
      <input id="fService" placeholder="service">
      <input id="fSource" placeholder="source IP">
      <input id="fPort" placeholder="dst port">
      <select id="fSeverity">
        <option value="">severity:any</option>
        <option value="high">high</option>
        <option value="medium">medium</option>
        <option value="low">low</option>
      </select>
      <input id="fQuery" placeholder="search text">
      <input id="fLimit" type="number" min="1" max="1000" value="200">
      <div class="actions">
        <button class="secondary" id="refreshBtn">Обновить</button>
        <button class="danger" id="purgeBtn">Очистить events</button>
      </div>
    </section>

    <section class="summary" id="summary"></section>
    <div class="msg" id="msg"></div>

    <section class="table-wrap">
      <table>
        <thead id="head"></thead>
        <tbody id="rows"></tbody>
      </table>
    </section>
  </main>
  <script>
    const $ = (id) => document.getElementById(id);
    const esc = (v) => String(v ?? '').replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    const ts = (v) => v ? new Date(Number(v) * 1000).toLocaleString() : '';
    const clsSeverity = (v) => v === 'high' ? 'sev-high' : v === 'medium' ? 'sev-medium' : v === 'low' ? 'sev-low' : '';
    let mode = 'normalized';

    function setMsg(text) { $('msg').textContent = text || ''; }
    async function req(path, opts = {}) {
      const response = await fetch(path, { cache: 'no-store', headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) }, ...opts });
      const text = await response.text();
      const data = text ? JSON.parse(text) : {};
      if (!response.ok) throw new Error(data.error || data.status || response.statusText);
      return data;
    }
    function queryBase() {
      const p = new URLSearchParams();
      const fields = [
        ['sensor_id', $('fSensor').value],
        ['profile', $('fProfile').value],
        ['honeypot', $('fHoneypot').value],
        ['service', $('fService').value],
        ['src_ip', $('fSource').value],
        ['dst_port', $('fPort').value],
        ['severity', $('fSeverity').value],
        ['q', $('fQuery').value],
      ];
      fields.forEach(([key, value]) => { if (String(value || '').trim()) p.set(key, String(value).trim()); });
      p.set('limit', String(Math.max(1, Math.min(1000, Number($('fLimit').value || 200)))));
      return p;
    }
    function eventQuery() {
      const p = new URLSearchParams();
      if ($('fSensor').value.trim()) p.set('sensor_id', $('fSensor').value.trim());
      if ($('fHoneypot').value.trim()) p.set('module', $('fHoneypot').value.trim());
      if ($('fService').value.trim()) p.set('service', $('fService').value.trim());
      if ($('fSeverity').value) p.set('severity', $('fSeverity').value);
      if ($('fQuery').value.trim()) p.set('event_type', $('fQuery').value.trim());
      p.set('limit', String(Math.max(1, Math.min(1000, Number($('fLimit').value || 200)))));
      return p;
    }
    function renderStats(stats) {
      const cards = [
        ['backend', stats.backend],
        ['normalized', stats.honeypot_event_count],
        ['raw logs', stats.raw_log_count],
        ['source IP', stats.unique_sources],
        ['high', stats.high_honeypot_events],
        ['credentials', stats.credential_events],
      ];
      $('stats').innerHTML = cards.map(([k, v]) => `<div class="stat"><div class="k">${esc(k)}</div><div class="v">${esc(v ?? 0)}</div></div>`).join('');
    }
    function renderSummary(stats) {
      const blocks = [
        ['Severity', stats.by_severity],
        ['Sources', stats.top_sources],
        ['Profiles', stats.top_profiles],
        ['Honeypots', stats.top_honeypots],
        ['Ports', stats.top_ports],
      ];
      $('summary').innerHTML = blocks.map(([title, rows]) => `
        <div>
          <h2>${esc(title)}</h2>
          ${(rows || []).map((r) => `<span class="pill"><strong>${esc(r.label)}</strong>${esc(r.count)}</span>`).join('') || '<span class="muted">нет данных</span>'}
        </div>
      `).join('');
    }
    function renderNormalized(events) {
      $('head').innerHTML = '<tr><th>time</th><th>sensor/profile</th><th>honeypot/service</th><th>event</th><th>source</th><th>destination</th><th>evidence</th><th>raw</th></tr>';
      $('rows').innerHTML = (events || []).slice().reverse().map((e) => `
        <tr>
          <td>${esc(ts(e.received_at || e.timestamp))}</td>
          <td><strong>${esc(e.sensor_id)}</strong><br><span class="muted">${esc(e.profile || e.device_type || '')}</span></td>
          <td><strong>${esc(e.honeypot || e.module || '')}</strong><br><span class="muted">${esc(e.service || '')}</span></td>
          <td><span class="${clsSeverity(e.severity)}">${esc(e.severity || '')}</span><br>${esc(e.event_type || '')}</td>
          <td>${esc(e.src_ip || '')}${e.src_port ? ':' + esc(e.src_port) : ''}</td>
          <td>${esc(e.dst_ip || '')}${e.dst_port ? ':' + esc(e.dst_port) : ''}</td>
          <td><code>${esc(e.username ? `user=${e.username} ` : '')}${esc(e.command || e.url || e.payload_sample || '')}</code></td>
          <td><details><summary>json</summary><code>${esc(JSON.stringify(e.raw_event || {}, null, 2))}</code></details></td>
        </tr>
      `).join('') || '<tr><td colspan="8">нет данных</td></tr>';
    }
    function renderRaw(logs) {
      $('head').innerHTML = '<tr><th>time</th><th>sensor/profile</th><th>honeypot/service</th><th>source</th><th>container</th><th>raw line</th><th>parsed</th></tr>';
      $('rows').innerHTML = (logs || []).slice().reverse().map((e) => `
        <tr>
          <td>${esc(ts(e.received_at))}</td>
          <td><strong>${esc(e.sensor_id)}</strong><br><span class="muted">${esc(e.profile || e.device_type || '')}</span></td>
          <td><strong>${esc(e.honeypot || '')}</strong><br><span class="muted">${esc(e.service || '')}</span></td>
          <td>${esc(e.source_name || e.source_path || '')}</td>
          <td>${esc(e.container_name || '')}</td>
          <td><code>${esc(e.raw_line || '')}</code></td>
          <td><details><summary>json</summary><code>${esc(JSON.stringify(e.parsed_json || e.raw_event || {}, null, 2))}</code></details></td>
        </tr>
      `).join('') || '<tr><td colspan="7">нет данных</td></tr>';
    }
    function renderEvents(events) {
      $('head').innerHTML = '<tr><th>time</th><th>sensor</th><th>module/service</th><th>type</th><th>severity</th><th>source</th><th>sample</th></tr>';
      $('rows').innerHTML = (events || []).slice().reverse().map((e) => `
        <tr>
          <td>${esc(ts(e.received_at || e.timestamp))}</td>
          <td>${esc(e.sensor_id)}</td>
          <td>${esc(e.module || '')}/${esc(e.service || '')}</td>
          <td>${esc(e.event_type)}</td>
          <td class="${clsSeverity(e.severity)}">${esc(e.severity || '')}</td>
          <td>${esc(e.src_ip || '')}${e.src_port ? ':' + esc(e.src_port) : ''}</td>
          <td><code>${esc(e.raw_sample || '')}</code></td>
        </tr>
      `).join('') || '<tr><td colspan="7">нет данных</td></tr>';
    }
    async function refresh() {
      setMsg('Загрузка...');
      const statsPromise = req('/api/db/stats');
      let dataPromise;
      if (mode === 'normalized') dataPromise = req('/api/honeypot-events?' + queryBase().toString());
      else if (mode === 'raw') dataPromise = req('/api/logs/raw?' + queryBase().toString());
      else dataPromise = req('/api/events?' + eventQuery().toString());
      const [stats, data] = await Promise.all([statsPromise, dataPromise]);
      renderStats(stats);
      renderSummary(stats);
      if (mode === 'normalized') renderNormalized(data.events || []);
      else if (mode === 'raw') renderRaw(data.logs || []);
      else renderEvents(data.events || []);
      setMsg(`Показано: ${(data.events || data.logs || []).length}`);
    }
    async function purgeDb() {
      if (!confirm('Удалить записи из старой таблицы events? Raw honeypot logs и нормализованные события останутся.')) return;
      const data = await req('/api/db/purge', { method: 'POST', body: '{}' });
      setMsg(`Удалено events: ${data.deleted_events}`);
      await refresh();
    }
    document.querySelectorAll('[data-mode]').forEach((btn) => btn.addEventListener('click', () => {
      mode = btn.dataset.mode;
      document.querySelectorAll('[data-mode]').forEach((item) => item.className = item.dataset.mode === mode ? 'active' : 'secondary');
      refresh().catch((e) => setMsg(e.message));
    }));
    $('refreshBtn').addEventListener('click', () => refresh().catch((e) => setMsg(e.message)));
    $('purgeBtn').addEventListener('click', () => purgeDb().catch((e) => setMsg(e.message)));
    document.querySelectorAll('input, select').forEach((el) => el.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') refresh().catch((e) => setMsg(e.message));
    }));
    refresh().catch((e) => setMsg(e.message));
  </script>
</body>
</html>
