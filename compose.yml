services:
  reverse-proxy:
    build:
      context: .
      dockerfile: services/reverse-proxy/Dockerfile
    container_name: edc-reverse-proxy
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - manager-api
      - agent-gateway
      - log-receiver
      - config-renderer

  manager-api:
    build:
      context: .
      dockerfile: services/manager-api/Dockerfile
    container_name: edc-manager-api
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - ./catalog:/app/catalog:ro
      - ./config:/app/config
      - ./var/center:/app/var/center
    environment:
      CENTER_DB_DSN: postgresql://edc:edc@postgres:5432/edc
    depends_on:
      postgres:
        condition: service_healthy

  agent-gateway:
    build:
      context: .
      dockerfile: services/agent-gateway/Dockerfile
    container_name: edc-agent-gateway
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      MANAGER_API_URL: http://manager-api:8080
    depends_on:
      - manager-api

  config-renderer:
    build:
      context: .
      dockerfile: services/config-renderer/Dockerfile
    container_name: edc-config-renderer
    restart: unless-stopped
    ports:
      - "8092:8092"
    depends_on:
      - manager-api

  log-receiver:
    build:
      context: .
      dockerfile: services/log-receiver/Dockerfile
    container_name: edc-log-receiver
    restart: unless-stopped
    ports:
      - "8091:8091"
    volumes:
      - ./var/center:/app/var/center
    environment:
      CENTER_DB_DSN: postgresql://edc:edc@postgres:5432/edc
    depends_on:
      postgres:
        condition: service_healthy

  log-normalizer:
    build:
      context: .
      dockerfile: services/log-normalizer/Dockerfile
    container_name: edc-log-normalizer
    restart: unless-stopped
    volumes:
      - ./var/center:/app/var/center
    environment:
      CENTER_DB_DSN: postgresql://edc:edc@postgres:5432/edc
      NORMALIZER_INTERVAL_SECONDS: "5"
      NORMALIZER_BATCH_SIZE: "500"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: edc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: edc
      POSTGRES_USER: edc
      POSTGRES_PASSWORD: edc
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edc -d edc"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  grafana:
    image: grafana/grafana:11.3.0
    container_name: edc-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: centre
      GF_SECURITY_ADMIN_PASSWORD: "centre123"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  grafana_data:
