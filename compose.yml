services:
  center:
    build:
      context: .
      dockerfile: center/Dockerfile
    container_name: edc-center
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./catalog:/app/catalog:ro
      - ./config:/app/config
      - ./var/center:/app/var/center
    environment:
      CENTER_DB_DSN: postgresql://edc:edc@postgres:5432/edc
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: edc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: edc
      POSTGRES_USER: edc
      POSTGRES_PASSWORD: edc
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edc -d edc"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  grafana:
    image: grafana/grafana:11.3.0
    container_name: edc-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: centre
      GF_SECURITY_ADMIN_PASSWORD: "centre123"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  grafana_data:
