services:
  sensor-agent:
    build:
      context: .
      dockerfile: sensor/Dockerfile.agent
    container_name: edc-sensor-agent-${EDC_SENSOR_ID:-local-sensor}
    restart: unless-stopped
    environment:
      EDC_IMAGE_POLICY: ${EDC_IMAGE_POLICY:-prebuilt_only}
      EDC_LOG_RECEIVER_URL: ${EDC_LOG_RECEIVER_URL:-}
    command:
      - --center
      - ${EDC_CENTER_URL:-http://host.docker.internal:8080}
      - --sensor-id
      - ${EDC_SENSOR_ID:-local-sensor}
      - --state-dir
      - /var/lib/edc-sensor
      - --serve
      - --interval
      - ${EDC_INTERVAL:-20}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${EDC_SENSOR_STATE_DIR:-/var/lib/edc-sensor}:/var/lib/edc-sensor
    extra_hosts:
      - host.docker.internal:host-gateway
