events {}

http {
  resolver 127.0.0.11 ipv6=off valid=10s;

  server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    location /agent/ {
      set $agent_gateway http://agent-gateway:8081;
      proxy_pass $agent_gateway;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /logs/ {
      set $log_receiver http://log-receiver:8091;
      proxy_pass $log_receiver;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /renderer/ {
      set $config_renderer http://config-renderer:8092;
      rewrite ^/renderer/(.*)$ /$1 break;
      proxy_pass $config_renderer;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      set $manager_api http://manager-api:8080;
      proxy_pass $manager_api;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
