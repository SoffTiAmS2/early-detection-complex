events {}

http {
  upstream manager_api {
    server manager-api:8080;
  }

  upstream agent_gateway {
    server agent-gateway:8081;
  }

  upstream log_receiver {
    server log-receiver:8091;
  }

  upstream config_renderer {
    server config-renderer:8092;
  }

  server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    location /agent/ {
      proxy_pass http://agent_gateway;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /logs/ {
      proxy_pass http://log_receiver;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /renderer/ {
      rewrite ^/renderer/(.*)$ /$1 break;
      proxy_pass http://config_renderer;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://manager_api;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
