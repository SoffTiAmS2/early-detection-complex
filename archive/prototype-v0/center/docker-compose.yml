services:
  collector:
    build:
      context: ./collector
    container_name: early-detection-central
    environment:
      CENTRAL_BIND: 0.0.0.0
      CENTRAL_PORT: 8080
      EVENT_STORE: /data/events.jsonl
    ports:
      - "8080:8080"
    volumes:
      - ./storage:/data
    restart: unless-stopped

  manager:
    build:
      context: ..
      dockerfile: center/manager/Dockerfile
    container_name: early-detection-manager
    command: ["python", "center/manager/backend/server.py", "--host", "0.0.0.0", "--port", "8090"]
    environment:
      MANAGER_HOST: 0.0.0.0
      MANAGER_PORT: 8090
      CENTRAL_API_BASE: http://collector:8080
    ports:
      - "8090:8090"
    volumes:
      - ..:/app
    depends_on:
      - collector
    restart: unless-stopped
